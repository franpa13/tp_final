<mat-card>
  <mat-card-header>
    <mat-card-title>Productos</mat-card-title>
    <mat-card-subtitle>Ejemplo de CRUD simple: alta, edición y baja de productos.</mat-card-subtitle>
  </mat-card-header>

  <mat-card-actions class="px-4">
    <button (click)="abrirFormularioCrear()" mat-raised-button color="primary" type="button">
      <mat-icon>add</mat-icon>
      Nuevo producto
    </button>
  </mat-card-actions>

  <mat-card-content>
    <div class="overflow-x-auto">
      @if (productos().length == 0) {
      <p class="p-2 bg-gray-200 flex justify-center gap-2 items-center">Todavía no hay productos cargados
        <mat-icon>inventory_2</mat-icon>
      </p>
      }@else{
      <table mat-table [dataSource]="productos()" class="w-full min-w-150">

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let producto">{{ producto.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let producto">{{ producto.descripcion || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="precio">
          <th mat-header-cell *matHeaderCellDef>Precio</th>
          <td mat-cell *matCellDef="let producto">$ {{ producto.precio }}</td>
        </ng-container>

        <ng-container matColumnDef="stock">
          <th mat-header-cell *matHeaderCellDef>Stock</th>
          <td mat-cell *matCellDef="let producto">{{ producto.stock }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let producto">
            <button mat-icon-button (click)="abrirFormularioEditar(producto)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminarProducto(producto.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
      }
    </div>
  </mat-card-content>
</mat-card>
