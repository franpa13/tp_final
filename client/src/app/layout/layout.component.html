<mat-sidenav-container class="min-h-dvh">

  <mat-sidenav #sidenav [mode]="isMobile() ? 'over' : 'side'" [opened]="isMobile() ? sidenavOpen() : true"
    class="bg-green-50! w-65! rounded-none">
    <div class="flex items-center flex-col text-green-900 gap-1 pt-2">
      <mat-icon class="text-4xl! w-10! h-10!">sports_soccer</mat-icon>
      <mat-card-title class="font-medium!">CanchApp</mat-card-title>
    </div>

    <mat-nav-list>
      @for (item of menuItems; track item.path) {
      <a mat-list-item [routerLink]="item.path" routerLinkActive="!bg-blue-100"
        [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }" (click)="onNavClick()">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
      }
      <a mat-list-item [routerLink]="toProfileLink" class="absolute! bottom-5!" routerLinkActive="!bg-blue-100"
        [routerLinkActiveOptions]="{ exact: toProfileLink === '/dashboard' }" (click)="onNavClick()">
        <mat-icon matListItemIcon>account_circle</mat-icon>
        <span matListItemTitle>Mi Perfil</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <nav class="flex items-center gap-2 px-4 h-16 border-b border-slate-200 bg-white sticky top-0 z-10">
      @if (isMobile()) {
      <button mat-icon-button (click)="toggleSidenav()">
        <mat-icon>menu</mat-icon>
      </button>
      }
      <nav class="flex-1 flex items-center gap-1 text-sm">
        @for (item of breadcrumb(); track item.path; let last = $last) {
        @if (last) {
        <span class="font-semibold text-slate-800">{{ item.label }}</span>
        } @else {
        <a [routerLink]="item.path" class="text-slate-400 hover:text-slate-600 transition-colors">
          {{ item.label }}
        </a>
        <span class="text-slate-300">/</span>
        }
        }
      </nav>
      <button mat-stroked-button type="button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span class="hidden sm:inline">Salir</span>
      </button>
    </nav>

    <main class="p-4 md:p-6">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
